name: Build OpenWrt 25.12 improvedbygpt - Export PassWall Packages

on:
  workflow_dispatch:

env:
  RELEASE: 25.12-SNAPSHOT
  TARGET: x86
  SUBTARGET: 64
  ARCH: x86_64
  SDK_BASE_URL: https://downloads.openwrt.org/releases/25.12-SNAPSHOT/targets/x86/64

jobs:
  build-passwall-packages:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext \
            git libncurses5-dev libncursesw5-dev libssl-dev python3 python3-setuptools \
            rsync swig unzip zlib1g-dev file wget curl xz-utils zstd jq

      - name: Download official OpenWrt 25.12 SDK
        run: |
          set -e

          SDK_FILE="$(curl -fsSL "$SDK_BASE_URL/" \
            | grep -oE 'openwrt-sdk-[^"]+Linux-x86_64\.tar\.(zst|xz)' \
            | head -n 1)"

          if [ -z "$SDK_FILE" ]; then
            echo "ERROR: Cannot find OpenWrt SDK in $SDK_BASE_URL"
            exit 1
          fi

          echo "SDK_FILE=$SDK_FILE"

          wget -O "openwrt-sdk.tar.${SDK_FILE##*.}" "$SDK_BASE_URL/$SDK_FILE"

          mkdir -p openwrt-sdk
          tar --strip-components=1 -xf "openwrt-sdk.tar.${SDK_FILE##*.}" -C openwrt-sdk

      - name: Add PassWall official feeds
        working-directory: openwrt-sdk
        run: |
          set -e

          cat >> feeds.conf.default <<'EOF'

          # PassWall official feeds
          src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main
          src-git passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;main
          EOF

          ./scripts/feeds update -a

      - name: Remove conflicting official packages before install feeds
        working-directory: openwrt-sdk
        run: |
          set -e

          rm -rf feeds/packages/net/{xray-core,v2ray-geodata,sing-box,chinadns-ng,dns2socks,hysteria,ipt2socks,microsocks,naiveproxy,shadowsocks-libev,shadowsocks-rust,simple-obfs,tcping,trojan-plus,tuic-client,v2ray-plugin,xray-plugin,geoview,shadow-tls}

          rm -rf feeds/luci/applications/luci-app-passwall
          rm -rf feeds/luci/applications/luci-app-passwall2

          ./scripts/feeds install -a

          find package feeds -xtype l -delete || true

      - name: Generate PassWall build config
        working-directory: openwrt-sdk
        run: |
          set -e

          touch .config

          cat >> .config <<'EOF'
          CONFIG_PACKAGE_luci-app-passwall=m
          CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=m

          CONFIG_PACKAGE_xray-core=m
          CONFIG_PACKAGE_sing-box=m
          CONFIG_PACKAGE_v2ray-geodata=m
          CONFIG_PACKAGE_geoview=m
          CONFIG_PACKAGE_chinadns-ng=m
          CONFIG_PACKAGE_dns2socks=m
          CONFIG_PACKAGE_hysteria=m
          CONFIG_PACKAGE_ipt2socks=m
          CONFIG_PACKAGE_microsocks=m
          CONFIG_PACKAGE_naiveproxy=m
          CONFIG_PACKAGE_shadow-tls=m
          CONFIG_PACKAGE_shadowsocks-rust=m
          CONFIG_PACKAGE_simple-obfs=m
          CONFIG_PACKAGE_tcping=m
          CONFIG_PACKAGE_tuic-client=m
          CONFIG_PACKAGE_v2ray-plugin=m
          CONFIG_PACKAGE_xray-plugin=m

          # 不编译 shadowsocksr-libev
          # CONFIG_PACKAGE_shadowsocksr-libev is not set
          EOF

          make defconfig

          echo "===== PassWall selected config ====="
          grep -E 'CONFIG_PACKAGE_(luci-app-passwall|luci-i18n-passwall|xray-core|sing-box|v2ray-geodata|geoview|chinadns-ng|dns2socks|hysteria|ipt2socks|microsocks|naiveproxy|shadow-tls|shadowsocks-rust|shadowsocksr-libev|simple-obfs|tcping|tuic-client|v2ray-plugin|xray-plugin)' .config || true

      - name: Download package sources
        working-directory: openwrt-sdk
        run: |
          set -e
          make download -j$(nproc) V=s

      - name: Build PassWall dependency packages
        working-directory: openwrt-sdk
        run: |
          set -e

          make package/feeds/passwall_packages/compile -j$(nproc) V=s || \
          make package/feeds/passwall_packages/compile V=s

      - name: Build luci-app-passwall
        working-directory: openwrt-sdk
        run: |
          set -e

          make package/feeds/passwall_luci/luci-app-passwall/compile -j$(nproc) V=s || \
          make package/feeds/passwall_luci/luci-app-passwall/compile V=s

      - name: Generate package index
        working-directory: openwrt-sdk
        run: |
          set -e
          make package/index V=s || true

      - name: Collect PassWall APK packages
        working-directory: openwrt-sdk
        run: |
          set -e

          mkdir -p ../artifact/passwall-apk

          echo "===== all built apk packages ====="
          find bin/packages -type f -name "*.apk" | sort || true

          for feed in passwall_luci passwall_packages; do
            if [ -d "bin/packages/${ARCH}/${feed}" ]; then
              mkdir -p "../artifact/passwall-apk/${feed}"
              cp -av "bin/packages/${ARCH}/${feed}/"* "../artifact/passwall-apk/${feed}/" || true
            fi
          done

          cat > ../artifact/passwall-apk/README.txt <<'EOF'
          OpenWrt 25.12 x86_64 PassWall APK packages

          上传到路由器示例：

            scp -r passwall-apk root@192.168.50.1:/tmp/

          SSH 进入路由器后执行：

            cd /tmp/passwall-apk
            apk add --allow-untrusted passwall_packages/*.apk passwall_luci/*.apk
            /etc/init.d/passwall restart

          注意：
          1. 这是 OpenWrt 25.12-SNAPSHOT / x86_64 的 APK 包。
          2. 本工作流没有编译 shadowsocksr-libev。
          3. 如果安装时提示依赖缺失，先执行 apk update。
          EOF

          cd ../artifact
          tar -czf openwrt-25.12-x86_64-passwall-apk.tar.gz passwall-apk

      - name: Upload PassWall packages
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-25.12-x86_64-passwall-apk
          path: |
            artifact/passwall-apk
            artifact/openwrt-25.12-x86_64-passwall-apk.tar.gz
