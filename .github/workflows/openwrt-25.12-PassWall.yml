name: Build OpenWrt 25.12 improvedbygpt - Export PassWall Packages

on:
  workflow_dispatch:

env:
  RELEASE: 25.12-SNAPSHOT
  TARGET: x86
  SUBTARGET: 64
  ARCH: x86_64
  SDK_BASE_URL: https://downloads.openwrt.org/releases/25.12-SNAPSHOT/targets/x86/64

jobs:
  build-passwall-packages:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext \
            git libncurses5-dev libncursesw5-dev libssl-dev python3 python3-setuptools \
            rsync swig unzip zlib1g-dev file wget curl xz-utils zstd jq

      - name: Download official OpenWrt 25.12 SDK
        run: |
          set -e

          echo "SDK_BASE_URL=$SDK_BASE_URL"

          SDK_FILE="$(curl -fsSL "$SDK_BASE_URL/" \
            | grep -oE 'openwrt-sdk-[^"]+Linux-x86_64\.tar\.(zst|xz)' \
            | head -n 1)"

          if [ -z "$SDK_FILE" ]; then
            echo "ERROR: Cannot find OpenWrt SDK in $SDK_BASE_URL"
            exit 1
          fi

          echo "SDK_FILE=$SDK_FILE"

          wget -O "openwrt-sdk.tar.${SDK_FILE##*.}" "$SDK_BASE_URL/$SDK_FILE"

          mkdir -p openwrt-sdk
          tar --strip-components=1 -xf "openwrt-sdk.tar.${SDK_FILE##*.}" -C openwrt-sdk

      - name: Add PassWall official feeds
        working-directory: openwrt-sdk
        run: |
          set -e

          # 放在 feeds.conf.default 顶部，让 PassWall feed 优先级高于官方 packages feed
          sed -i '1i src-git passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;main' feeds.conf.default
          sed -i '1i src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main' feeds.conf.default

          echo "===== feeds.conf.default ====="
          cat feeds.conf.default

          ./scripts/feeds update -a

      - name: Remove conflicting packages and shadowsocksr-libev
        working-directory: openwrt-sdk
        run: |
          set -e

          # 删除 OpenWrt 官方 feeds 里可能和 PassWall feed 冲突的包
          rm -rf feeds/packages/net/{xray-core,v2ray-geodata,sing-box,chinadns-ng,dns2socks,hysteria,ipt2socks,microsocks,naiveproxy,shadowsocks-rust,shadowsocksr-libev,simple-obfs,tcping,v2ray-plugin,xray-plugin,geoview,shadow-tls}

          # 删除旧 luci-app-passwall
          rm -rf feeds/luci/applications/luci-app-passwall
          rm -rf feeds/luci/applications/luci-app-passwall2

          # 按你的要求：不编译 shadowsocksr-libev
          rm -rf feeds/passwall_packages/shadowsocksr-libev

          ./scripts/feeds install -a

          find package feeds -xtype l -delete || true

      - name: Generate PassWall build config
        working-directory: openwrt-sdk
        run: |
          set -e

          touch .config

          # PassWall 主程序和中文语言包
          ./scripts/config -m PACKAGE_luci-app-passwall
          ./scripts/config -m PACKAGE_luci-i18n-passwall-zh-cn

          # OpenWrt 25.12 默认 fw4，优先 nftables 透明代理
          ./scripts/config --disable PACKAGE_luci-app-passwall_Iptables_Transparent_Proxy
          ./scripts/config --enable PACKAGE_luci-app-passwall_Nftables_Transparent_Proxy

          # 常用核心组件
          ./scripts/config --enable PACKAGE_luci-app-passwall_INCLUDE_Geoview
          ./scripts/config --enable PACKAGE_luci-app-passwall_INCLUDE_Hysteria
          ./scripts/config --enable PACKAGE_luci-app-passwall_INCLUDE_NaiveProxy
          ./scripts/config --enable PACKAGE_luci-app-passwall_INCLUDE_Shadowsocks_Rust_Client
          ./scripts/config --enable PACKAGE_luci-app-passwall_INCLUDE_Shadow_TLS
          ./scripts/config --enable PACKAGE_luci-app-passwall_INCLUDE_Simple_Obfs
          ./scripts/config --enable PACKAGE_luci-app-passwall_INCLUDE_SingBox
          ./scripts/config --enable PACKAGE_luci-app-passwall_INCLUDE_V2ray_Geodata
          ./scripts/config --enable PACKAGE_luci-app-passwall_INCLUDE_V2ray_Plugin
          ./scripts/config --enable PACKAGE_luci-app-passwall_INCLUDE_Xray
          ./scripts/config --enable PACKAGE_luci-app-passwall_INCLUDE_Xray_Plugin

          # 按你的要求：禁用 SSR / shadowsocksr-libev
          ./scripts/config --disable PACKAGE_luci-app-passwall_INCLUDE_ShadowsocksR_Libev_Client
          ./scripts/config --disable PACKAGE_luci-app-passwall_INCLUDE_ShadowsocksR_Libev_Server
          ./scripts/config --disable PACKAGE_shadowsocksr-libev-ssr-check
          ./scripts/config --disable PACKAGE_shadowsocksr-libev-ssr-local
          ./scripts/config --disable PACKAGE_shadowsocksr-libev-ssr-nat
          ./scripts/config --disable PACKAGE_shadowsocksr-libev-ssr-redir
          ./scripts/config --disable PACKAGE_shadowsocksr-libev-ssr-server

          make defconfig

          echo "===== PassWall selected config ====="
          grep -E 'CONFIG_PACKAGE_(luci-app-passwall|luci-i18n-passwall|xray|sing-box|v2ray|geoview|chinadns|dns2socks|hysteria|ipt2socks|microsocks|naiveproxy|shadow-tls|shadowsocks|simple-obfs|tcping)' .config || true

          echo "===== Check shadowsocksr disabled ====="
          grep -i 'shadowsocksr' .config || true

      - name: Download package sources
        working-directory: openwrt-sdk
        run: |
          set -e
          make download -j$(nproc) V=s || make download V=s

      - name: Build PassWall packages one by one
        working-directory: openwrt-sdk
        run: |
          set -e

          compile_pkg() {
            PKG_PATH="$1"

            if [ -f "$PKG_PATH/Makefile" ]; then
              echo "===== Building $PKG_PATH ====="
              make "$PKG_PATH/compile" -j$(nproc) V=s || make "$PKG_PATH/compile" V=s
            else
              echo "===== Skip missing package: $PKG_PATH ====="
            fi
          }

          # 这里不能写 package/feeds/passwall_packages/compile
          # 必须逐个具体包目录编译

          compile_pkg package/feeds/passwall_packages/chinadns-ng
          compile_pkg package/feeds/passwall_packages/dns2socks
          compile_pkg package/feeds/passwall_packages/geoview
          compile_pkg package/feeds/passwall_packages/hysteria
          compile_pkg package/feeds/passwall_packages/ipt2socks
          compile_pkg package/feeds/passwall_packages/microsocks
          compile_pkg package/feeds/passwall_packages/naiveproxy
          compile_pkg package/feeds/passwall_packages/shadow-tls
          compile_pkg package/feeds/passwall_packages/shadowsocks-rust
          compile_pkg package/feeds/passwall_packages/simple-obfs
          compile_pkg package/feeds/passwall_packages/sing-box
          compile_pkg package/feeds/passwall_packages/tcping
          compile_pkg package/feeds/passwall_packages/v2ray-geodata
          compile_pkg package/feeds/passwall_packages/v2ray-plugin
          compile_pkg package/feeds/passwall_packages/xray-core
          compile_pkg package/feeds/passwall_packages/xray-plugin

          # 最后编译 PassWall LuCI
          compile_pkg package/feeds/passwall_luci/luci-app-passwall

      - name: Generate package index
        working-directory: openwrt-sdk
        run: |
          set -e
          make package/index V=s || true

      - name: Collect PassWall APK packages
        working-directory: openwrt-sdk
        run: |
          set -e

          mkdir -p ../artifact/passwall-apk/packages

          echo "===== all built apk packages ====="
          find bin/packages -type f -name "*.apk" | sort || true

          # 复制所有生成的 apk，但排除 shadowsocksr
          while IFS= read -r apk; do
            case "$apk" in
              *shadowsocksr*)
                echo "Skip SSR package: $apk"
                ;;
              *)
                subdir="$(dirname "$apk" | sed "s|^bin/packages/${ARCH}/||")"
                mkdir -p "../artifact/passwall-apk/packages/$subdir"
                cp -av "$apk" "../artifact/passwall-apk/packages/$subdir/"
                ;;
            esac
          done < <(find "bin/packages/${ARCH}" -type f -name "*.apk" | sort)

          cat > ../artifact/passwall-apk/README.txt <<'EOF'
          OpenWrt 25.12 x86_64 PassWall APK packages

          上传到路由器：

            scp -r passwall-apk root@192.168.50.1:/tmp/

          SSH 进入路由器后执行：

            cd /tmp/passwall-apk
            find packages -name "*.apk" -print0 | xargs -0 apk add --allow-untrusted
            /etc/init.d/passwall restart

          注意：
          1. 这是 OpenWrt 25.12-SNAPSHOT / x86_64 的 APK 包。
          2. 本工作流已经排除 shadowsocksr-libev。
          3. 如果安装时提示依赖缺失，先执行：
               apk update
             然后再重新执行安装命令。
          EOF

          cd ../artifact
          tar -czf openwrt-25.12-x86_64-passwall-apk.tar.gz passwall-apk

      - name: Upload PassWall packages
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-25.12-x86_64-passwall-apk
          path: |
            artifact/passwall-apk
            artifact/openwrt-25.12-x86_64-passwall-apk.tar.gz
