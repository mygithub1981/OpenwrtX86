name: Build LEDE Firmware (Space Optimized)

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: '是否开启SSH连接进行配置 (true/false)'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检出代码 (Checkout)
      uses: actions/checkout@v4

    - name: 深度清理磁盘空间 & 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 1. 删除不需要的大型预装软件和目录 (腾出约 30GB+ 空间)
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup /usr/lib/jvm /usr/local/bin/aliyun /usr/local/bin/azcopy /usr/local/bin/terraform
        
        # 2. 移除冗余的服务包
        sudo docker image prune -a -f
        sudo apt-get -y purge azure-cli* docker* ghc* google* mono* mysql* php* zulu*
        
        # 3. 更新系统并安装 LEDE 编译必需依赖
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        
        # 4. 设置时区并准备工作目录
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        
        # 5. 打印当前可用空间（确认清理效果）
        echo "=========================================="
        echo "清理后的剩余空间："
        df -h
        echo "=========================================="

    - name: 下载 LEDE 源码
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 加载自定义 Feeds & DIY 脚本 (Part 1)
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 替换 Passwall 1/2 & DDNS-GO 插件源
      run: |
        cd openwrt
        
        # 1. 更新 feeds (先让 feeds 目录生成)
        ./scripts/feeds update -a
        
        # 2. 删除 feeds 中自带的冲突包 (针对性清理)
        # 清理 luci 里的插件
        rm -rf feeds/luci/applications/luci-app-passwall
        rm -rf feeds/luci/applications/luci-app-passwall2
        rm -rf feeds/luci/applications/luci-app-ddns-go
        
        # 清理 packages 里的核心组件和依赖
        rm -rf feeds/packages/net/{xray-core,v2ray-geodata,sing-box,chinadns-ng,dns2socks,hysteria,ipt2socks,microsocks,naiveproxy,shadowsocks-libev,shadowsocks-rust,shadowsocksr-libev,simple-obfs,tcping,trojan-plus,tuic-client,v2ray-plugin,xray-plugin,geoview,shadow-tls}
        rm -rf feeds/packages/net/ddns-go
        
        # 3. 克隆官方最新仓库到 package 目录 (优先级最高)
        # Passwall 1 及其依赖
        git clone https://github.com/Openwrt-Passwall/openwrt-passwall-packages package/passwall-packages
        git clone https://github.com/Openwrt-Passwall/openwrt-passwall package/passwall-luci
        
        # Passwall 2 官方
        git clone https://github.com/Openwrt-Passwall/openwrt-passwall2 package/openwrt-passwall2
        
        # DDNS-GO 官方
        git clone https://github.com/sirpdboy/luci-app-ddns-go package/ddns-go

        # 4. 最后安装 feeds
        ./scripts/feeds install -f -a
        ./scripts/feeds install -a

    - name: 加载自定义配置 (.config) & DIY 脚本 (Part 2)
      run: |
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: SSH 连接配置 (按需开启)
      uses: P3TERX/ssh2actions@main
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')

    - name: 下载软件包 (Make download)
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        # 删除下载失败的损坏文件 (小于1k的文件)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件 (Compile)
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        # 优先多线程编译，失败后自动转单线程输出详细日志
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 检查磁盘空间 (编译后)
      if: always()
      run: df -h

    - name: 整理编译出的固件
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件到 GitHub Artifacts
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

