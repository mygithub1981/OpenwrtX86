name: Build LEDE (changedockerzerotier)

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: '是否开启SSH配置固件 (true/false)'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="
    
    - name: 深度清理磁盘空间
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup /usr/lib/jvm
        sudo docker image prune -a -f
        sudo apt-get -y purge azure-cli* docker* ghc* google* mono* mysql* php* zulu*
        sudo apt update -y
        sudo apt full-upgrade -y
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
        bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
        genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
        libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
        libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
        python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
        swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Checkout
      uses: actions/checkout@v6

    - name: 下载 LEDE 源码
      working-directory: /workdir
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 加载自定义 feeds & DIY 脚本 (Part 1)
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 运行 Passwall 官方替换逻辑 (方法 2)
      run: |
        cd openwrt
        # 1. 更新并安装原有 feeds
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # 2. 移除官方提到的核心库及冲突包
        rm -rf feeds/packages/net/{xray-core,v2ray-geodata,sing-box,chinadns-ng,dns2socks,hysteria,ipt2socks,microsocks,naiveproxy,shadowsocks-libev,shadowsocks-rust,shadowsocksr-libev,simple-obfs,tcping,trojan-plus,tuic-client,v2ray-plugin,xray-plugin,geoview,shadow-tls}
        rm -rf feeds/luci/applications/luci-app-passwall
        rm -rf feeds/luci/applications/luci-app-passwall2
        rm -rf feeds/luci/applications/luci-app-ddns-go
        rm -rf feeds/packages/net/ddns-go
        rm -rf feeds/luci/applications/luci-app-lucky
        rm -rf feeds/packages/net/lucky
        
        # 3. 注入官方最新源码到 package 目录
        git clone --depth 1 https://github.com/Openwrt-Passwall/openwrt-passwall-packages package/passwall-packages
        git clone --depth 1 https://github.com/Openwrt-Passwall/openwrt-passwall package/passwall-luci
        git clone --depth 1 https://github.com/Openwrt-Passwall/openwrt-passwall2 package/passwall2-luci
        git clone --depth 1 https://github.com/sirpdboy/luci-app-ddns-go.git package/ddns-go
        git clone --depth 1 https://github.com/gdy666/luci-app-lucky.git package/lucky
        
        # 4. 再次安装刷新索引
        ./scripts/feeds install -f -a

    - name: 更新 Tailscale 到官方最新版
      run: |
        cd openwrt
        echo "=================================================="
        echo "开始更新 Tailscale 到官方最新版..."
        
        # 1. 浅克隆 OpenWrt 官方 packages 仓库
        git clone https://github.com/openwrt/packages.git --depth 1 openwrt-packages
        git clone https://github.com/Tokisaki-Galaxy/luci-app-tailscale-community.git --depth 1 openwrt-luci
        
        # 2. 删除 feeds 中自带的旧版 luci
        rm -rf feeds/luci/applications/luci-app-tailscale-community
        rm -rf feeds/packages/net/tailscale
        
        # 3. 将最新版的源码原路放回 feeds 的对应目录中
        cp -r openwrt-luci/luci-app-tailscale-community feeds/luci/applications/luci-app-tailscale-community
        cp -r openwrt-packages/net/tailscale feeds/packages/net/tailscale
        
        # 4. 一次性重新安装所有相关包，让编译系统批量更新软链接
        ./scripts/feeds install tailscale luci-app-tailscale-community
        
        # 5. 删除临时克隆的两个仓库，清理空间
        rm -rf openwrt-packages openwrt-luci
        
        echo "Tailscale 更新完成！"
        echo "=================================================="

    - name: 更新 Docker 全家桶及图形化界面 (Dockerman)
      run: |
        cd openwrt
        echo "=================================================="
        echo "开始更新 Docker 核心依赖及 luci-app-dockerman..."
        
        # 1. 并发浅克隆官方 packages 和 luci 仓库
        git clone https://github.com/openwrt/packages.git --depth 1 openwrt-packages
        git clone https://github.com/openwrt/luci.git --depth 1 openwrt-luci
        
        # 2. 删除 feeds 中自带的旧版 Docker 全家桶及 UI
        rm -rf feeds/packages/utils/docker
        rm -rf feeds/packages/utils/dockerd
        rm -rf feeds/packages/utils/containerd
        rm -rf feeds/packages/utils/runc
        rm -rf feeds/packages/utils/docker-compose
        rm -rf feeds/luci/applications/luci-app-dockerman
        rm -rf feeds/luci/libs/luci-lib-docker
        
        # 3. 将最新版的源码原路放回 feeds 的对应目录中
        cp -r openwrt-packages/utils/docker feeds/packages/utils/docker
        cp -r openwrt-packages/utils/dockerd feeds/packages/utils/dockerd
        cp -r openwrt-packages/utils/containerd feeds/packages/utils/containerd
        cp -r openwrt-packages/utils/runc feeds/packages/utils/runc
        cp -r openwrt-packages/utils/docker-compose feeds/packages/utils/docker-compose
        cp -r openwrt-luci/applications/luci-app-dockerman feeds/luci/applications/luci-app-dockerman
        
        # 补充：如果有 luci-lib-docker 依赖库，一并替换（防错机制）
        if [ -d "openwrt-luci/libs/luci-lib-docker" ]; then
          cp -r openwrt-luci/libs/luci-lib-docker feeds/luci/libs/luci-lib-docker
        fi
        
        # 4. 一次性重新安装所有相关包，让编译系统批量更新软链接
        ./scripts/feeds install docker dockerd containerd runc docker-compose luci-app-dockerman
        
        # 5. 删除临时克隆的两个仓库，清理空间
        rm -rf openwrt-packages openwrt-luci
        
        echo "Docker 及 Dockerman 联合更新完成！"
        echo "=================================================="

    - name: 更新 ZeroTier 核心到官方最新版
      run: |
        cd openwrt
        echo "=================================================="
        echo "开始更新 ZeroTier 核心到官方最新版..."
        
        # 1. 浅克隆官方 packages 仓库
        git clone https://github.com/openwrt/packages.git --depth 1 openwrt-packages
        
        # 2. 删除 feeds 中自带的旧版 zerotier (核心引擎)
        rm -rf feeds/packages/net/zerotier
        
        # 3. 将最新版的源码原路放回 feeds 的对应目录中
        cp -r openwrt-packages/net/zerotier feeds/packages/net/zerotier
        
        # 4. 重新安装包，让编译系统更新软链接
        ./scripts/feeds install zerotier
        
        # 5. 删除临时仓库，清理空间
        rm -rf openwrt-packages
        
        echo "ZeroTier 核心更新完成！(LuCI 界面保留 LEDE 完美适配版)"
        echo "=================================================="

    - name: 验证 ZeroTier 版本 (验明正身)
      run: |
        cd openwrt
        echo "=================================================="
        echo "【验明正身】当前 ZeroTier 核心版本："
        # 直接读取替换后的 Makefile 里的版本号变量
        grep "PKG_VERSION:=" feeds/packages/net/zerotier/Makefile
        echo "=================================================="

    - name: 验证 Docker 组件更新状态
      run: |
        cd openwrt
        echo "=================================================="
        echo "【验明正身】当前 dockerd 版本："
        grep "PKG_VERSION:=" feeds/packages/utils/dockerd/Makefile
        echo "【验明正身】当前 containerd 版本："
        grep "PKG_VERSION:=" feeds/packages/utils/containerd/Makefile
        echo "【验明正身】检查 dockerman 软链接是否成功生成："
        find package -name "luci-app-dockerman" -type l
        echo "=================================================="

    - name: 验证插件来源 (真相大白步骤)
      run: |
        cd openwrt
        echo "=================================================="
        echo "正在检查 luci-app-passwall 的实际物理路径："
        find package -name "luci-app-passwall" -type d
        echo "=================================================="
        echo "正在检查 xray-core 的来源："
        find package -name "xray-core" -type d
        echo "=================================================="
        echo "正在检查 tailscale 的来源 (它应该是一个软链接)："
        find package -name "tailscale" -type l
        echo "=================================================="
        echo "正在核对 tailscale 的版本号以验明正身："
        grep "PKG_VERSION:=" feeds/packages/net/tailscale/Makefile
        echo "=================================================="
        
    - name: 加载自定义配置 (.config) & DIY 脚本 (Part 2)
      run: |
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        # 运行 defconfig 以应用所有变更
        make defconfig

    - name: 强制推送 SSH 连接指令到 Telegram
      if: github.event.inputs.ssh == 'true'
      run: |
        # 即使 tmate 还没完全启动，我们也先发个预警，并在日志里抓取链接
        MSG="🚀 *SSH 调试模式已开启*
        项目: ${{ github.repository }}
        请立刻点击下方链接进入 Actions 日志复制 SSH 运行命令：
        [点击进入日志界面](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "parse_mode=Markdown" \
          -d "text=${MSG}"

    - name: 启动 SSH 远程配置
      uses: P3TERX/ssh2actions@main
      if: github.event.inputs.ssh == 'true'
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}

    - name: 下载编译资源 (Download)
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件 (Compile)
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        # 优先多线程编译，失败后自动转单线程输出详细日志
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 检查磁盘空间 (编译后)
      if: always()
      run: df -h

    - name: 整理编译出的固件
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 发送 Telegram 通知
      if: always()
      run: |
        if [[ "${{ steps.compile.outputs.status }}" == "success" ]]; then
          ICON="✅"
          STATUS="编译成功"
        else
          ICON="❌"
          STATUS="编译失败"
        fi
        MSG="${ICON} *GitHub Actions 编译通知*
        *项目:* LEDE 固件
        *状态:* ${STATUS}
        *时间:* $(date +'%Y-%m-%d %H:%M:%S')
        *链接:* [点击查看详情](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "parse_mode=Markdown" \
          -d "text=${MSG}"

    - name: 上传固件到 GitHub Artifacts
      uses: actions/upload-artifact@v6
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
