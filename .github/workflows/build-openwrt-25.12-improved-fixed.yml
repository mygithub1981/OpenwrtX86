name: Build openwrt 25.12 improvedbygpt and Export PassWall Packages

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: '是否开启SSH配置固件 (true/false)'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: openwrt25.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Free Disk Space
      uses: endersonmenezes/free-disk-space@v3
      with:
        remove_android: true
        remove_dotnet: true
        remove_haskell: true
        remove_tool_cache: true
        remove_swap: true
        remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable chromedriver google-cloud-sdk firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-* gfortran* imagemagick* *-jdk mongodb-* mono-* monodoc-* unixodbc-dev ant* perl libgl1-mesa-dri apache2* imagemagick* nginx phantomjs php* libpq-dev r-base* ruby* sphinxsearch"
        remove_packages_one_command: true
        remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia* /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle* /usr/local/bin/azcopy /usr/share/kotlinc /usr/share/apache-maven-* /usr/local/share/gecko_driver /usr/share/lintian"

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Create simulated physical disk
      run: |
        echo "Cleaning up Docker Images"
        sudo docker system prune --all --force --volumes

        echo "Clean Docker Images complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

        mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
        root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
        sudo truncate -s "${mnt_size}"G /mnt/mnt.img
        sudo truncate -s "${root_size}"G /root.img
        LOOP_MNT=$(sudo losetup -f --show /mnt/mnt.img)
        LOOP_ROOT=$(sudo losetup -f --show /root.img)
        sudo pvcreate "$LOOP_MNT" "$LOOP_ROOT"
        sudo vgcreate github "$LOOP_MNT" "$LOOP_ROOT"
        sudo lvcreate -n runner -l 100%FREE github
        sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
        sudo mkdir -p /builder
        sudo mount /dev/github/runner /builder
        sudo rm -rf "${GITHUB_WORKSPACE:?}"
        sudo mkdir -p "$GITHUB_WORKSPACE"
        sudo mount --bind /builder "$GITHUB_WORKSPACE"
        sudo chown -R runner:runner "$GITHUB_WORKSPACE"

        echo "Disk adjustment finished. Ready for heavy building!"
        echo "Simulated physical disk complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Checkout
      uses: actions/checkout@v6

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
        bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext \
        gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool \
        lib32gcc-s1 libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
        libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev \
        libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev \
        libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip \
        p7zip-full patch pkgconf python3 python3-pip python3-ply \
        python3-docutils python3-pyelftools python3-setuptools \
        qemu-utils re2c rsync scons squashfs-tools subversion swig \
        texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo rm -rf /etc/apt/sources.list.d/* /usr/local/lib/android /opt/ghc /usr/share/dotnet /usr/local/graalvm /usr/local/.ghcup \
        /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules
        sudo timedatectl set-timezone "$TZ"
        sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE"

    - name: Clone source code
      run: |
        git clone -b $REPO_BRANCH --single-branch --filter=blob:none $REPO_URL  openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 运行 Passwall 官方替换逻辑 (方法 2)
      run: |
        cd openwrt
        # 1.更新并安装原有 feeds
        # 更新 feeds
        ./scripts/feeds update -a
        ./scripts/feeds install -a

        # 2.删除冲突包
        rm -rf feeds/packages/net/{xray-core,v2ray-geodata,sing-box,chinadns-ng,dns2socks,hysteria,ipt2socks,microsocks,naiveproxy,shadowsocks-libev,shadowsocks-rust,shadowsocksr-libev,simple-obfs,tcping,trojan-plus,tuic-client,v2ray-plugin,xray-plugin,geoview,shadow-tls}
        rm -rf feeds/luci/applications/luci-app-passwall
        rm -rf feeds/luci/applications/luci-app-passwall2
        rm -rf feeds/luci/applications/luci-app-ddns-go
        rm -rf feeds/packages/net/ddns-go
        rm -rf feeds/luci/applications/luci-app-lucky
        rm -rf feeds/packages/net/lucky
        rm -rf feeds/luci/applications/luci-app-argon-config
        rm -rf feeds/luci/themes/luci-theme-argon

        # 3.清理 package/feeds/ 下产生的无效软链接（极度推荐！）
        # find 命令结合 -xtype l 会自动找出并删除所有指向空目标的死链接
        find package/feeds/ -type l -xtype l -delete

        # 4.删除 LEDE 内置重复包（使用 xargs -r 防止空结果报错）
        find package/ -type d -name "*passwall*" | xargs -r rm -rf
        find package/ -type d -name "*argon*" | xargs -r rm -rf
        find package/ -type d -name "*lucky*" | xargs -r rm -rf
        find package/ -type d -name "*ddns-go*" | xargs -r rm -rf

        # 5.拉取最新版
        git clone --depth 1 https://github.com/Openwrt-Passwall/openwrt-passwall-packages package/passwall-packages
        git clone --depth 1 https://github.com/Openwrt-Passwall/openwrt-passwall package/passwall-luci
        git clone --depth 1 https://github.com/Openwrt-Passwall/openwrt-passwall2 package/passwall2-luci
        git clone --depth 1 https://github.com/sirpdboy/luci-app-ddns-go.git package/ddns-go
        git clone --depth 1 https://github.com/gdy666/luci-app-lucky.git package/lucky
        git clone --depth 1 https://github.com/jerrykuku/luci-theme-argon.git package/luci-theme-argon
        git clone --depth 1 https://github.com/jerrykuku/luci-app-argon-config.git package/luci-app-argon-config

        # 6.引入 ImmortalWrt 的 LuCI 插件
        rm -rf /tmp/immortalwrt-luci
        git clone --depth 1 --filter=blob:none --sparse https://github.com/immortalwrt/luci /tmp/immortalwrt-luci
        cd /tmp/immortalwrt-luci

        # 使用更推荐的 cone 模式切出目录
        git sparse-checkout set applications/luci-app-timewol applications/luci-app-autoreboot applications/luci-app-zerotier
        cd "$GITHUB_WORKSPACE/openwrt"

        # 核心改动：直接复制到 package/ 自建目录下，免去所有 rm feeds、重装 feeds、手动软链接的繁琐步骤
        mkdir -p package/immortalwrt-apps
        cp -a /tmp/immortalwrt-luci/applications/luci-app-timewol package/immortalwrt-apps/
        cp -a /tmp/immortalwrt-luci/applications/luci-app-autoreboot package/immortalwrt-apps/
        cp -a /tmp/immortalwrt-luci/applications/luci-app-zerotier package/immortalwrt-apps/

        # 关键修复：把 ImmortalWrt 插件 Makefile 里的相对 luci.mk 改成官方 OpenWrt feeds/luci/luci.mk
        # 同时打印结果，方便在 Actions 日志里确认替换是否成功
        for app in luci-app-timewol luci-app-autoreboot luci-app-zerotier; do
          sed -i -E 's#^include[[:space:]]+(\.\./)+luci\.mk#include $(TOPDIR)/feeds/luci/luci.mk#g' package/immortalwrt-apps/$app/Makefile
          echo "检查 $app Makefile 里的 luci.mk 引用："
          grep -n "luci.mk" package/immortalwrt-apps/$app/Makefile
        done

        rm -rf tmp/

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 强制推送 SSH 连接指令到 Telegram
      if: github.event.inputs.ssh == 'true'
      run: |
        # 即使 tmate 还没完全启动，我们也先发个预警，并在日志里抓取链接
        MSG="🚀 *SSH 调试模式已开启*
        项目: ${{ github.repository }}
        请立刻点击下方链接进入 Actions 日志复制 SSH 运行命令：
        [点击进入日志界面](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "parse_mode=Markdown" \
          -d "text=${MSG}"

    - name: 启动 SSH 远程配置
      uses: P3TERX/ssh2actions@main
      if: github.event.inputs.ssh == 'true'
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig

        echo "检查目标 LuCI 插件是否仍然被选中："
        for p in luci-app-timewol luci-app-autoreboot luci-app-zerotier; do
          if grep -q "^CONFIG_PACKAGE_${p}=y" .config; then
            echo "✅ ${p} 已选中"
          else
            echo "❌ ${p} 未被选中，可能包未识别、依赖不满足，或 openwrt25.config 写法有问题"
            echo "当前 .config 中相关条目如下："
            grep -n "${p}" .config || true
            exit 1
          fi
        done

        make download -j$(($(nproc) * 3 / 2)) || make download -j1 V=s
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "CPU $(nproc) thread"
        echo -e "$(($(nproc) * 3 / 2)) thread compile"
        make -j$(($(nproc) * 3 / 2)) || make -j1 || make -j1 V=s

        echo "检查最终固件 manifest 是否包含目标插件："
        MANIFEST="$(find bin/targets -name '*.manifest' | head -n 1)"
        if [ -z "$MANIFEST" ]; then
          echo "❌ 未找到 manifest 文件，无法确认固件包清单"
          exit 1
        fi
        echo "使用 manifest：$MANIFEST"

        for p in luci-app-timewol luci-app-autoreboot luci-app-zerotier; do
          if grep -Eq "^${p}[[:space:]]" "$MANIFEST"; then
            echo "✅ 固件已包含 ${p}"
          else
            echo "❌ 固件未包含 ${p}"
            echo "manifest 中相关条目如下："
            grep -n "${p}" "$MANIFEST" || true
            exit 1
          fi
        done

        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Collect PassWall packages from firmware build
      id: collect_passwall_packages
      if: steps.compile.outputs.status == 'success'
      run: |
        mkdir -p passwall-packages
        cd openwrt

        echo "从完整 OpenWrt 固件编译结果中收集 PassWall 相关安装包"
        echo "当前 bin/packages 中的软件包："
        find bin/packages -type f \( -name "*.apk" -o -name "*.ipk" \) | sort || true

        find bin/packages -type f \( -name "*.apk" -o -name "*.ipk" \) \
          | grep -Ei '(passwall|xray|sing-box|hysteria|v2ray|geodata|geoip|geosite|chinadns|dns2socks|ipt2socks|microsocks|naiveproxy|shadowsocks|simple-obfs|tcping|haproxy|geoview|shadow-tls|tuic)' \
          | grep -Eiv '(shadowsocksr|ssr)' \
          | while read -r pkg; do
              cp -v "$pkg" "$GITHUB_WORKSPACE/passwall-packages/"
            done

        cat > "$GITHUB_WORKSPACE/passwall-packages/README.txt" <<'EOF'
        OpenWrt 25.12 PassWall 升级包

        这些软件包来自本次完整 OpenWrt 固件编译结果。

        上传到路由器：

          scp -r passwall-packages root@192.168.50.1:/tmp/

        SSH 进入路由器后执行：

          cd /tmp/passwall-packages
          apk add --allow-untrusted *.apk
          /etc/init.d/passwall restart

        说明：
        1. OpenWrt 25.12 使用 apk 包。
        2. 本目录只收集 PassWall 相关升级包。
        3. 已排除 shadowsocksr / ssr 相关包。
        4. 这些包最好只用于同源码、同架构、同版本 OpenWrt 25.12 x86_64 固件。
        5. 如果安装时报依赖缺失，先执行 apk update。
        EOF

        echo "已收集的软件包："
        ls -lh "$GITHUB_WORKSPACE/passwall-packages" || true

        if [ -z "$(find "$GITHUB_WORKSPACE/passwall-packages" -type f \( -name "*.apk" -o -name "*.ipk" \) | head -n 1)" ]; then
          echo "❌ 没有找到 PassWall 相关安装包"
          exit 1
        fi

    - name: Upload PassWall packages
      uses: actions/upload-artifact@v6
      if: steps.compile.outputs.status == 'success'
      with:
        name: PassWall_packages${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: passwall-packages

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@v6
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 发送 Telegram 通知
      if: always()
      run: |
        if [[ "${{ steps.compile.outputs.status }}" == "success" ]]; then
          ICON="✅"
          STATUS="编译成功"
        else
          ICON="❌"
          STATUS="编译失败"
        fi
        MSG="${ICON} *GitHub Actions 编译通知*
        *项目:* LEDE 固件
        *状态:* ${STATUS}
        *时间:* $(date +'%Y-%m-%d %H:%M:%S')
        *链接:* [点击查看详情](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "parse_mode=Markdown" \
          -d "text=${MSG}"

    - name: Upload firmware directory
      uses: actions/upload-artifact@v6
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Upload firmware to cowtransfer
      id: cowtransfer
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_COWTRANSFER == 'true' && !cancelled()
      run: |
        curl -fsSL git.io/file-transfer | sh
        ./transfer cow --block 2621440 -s -p 64 --no-progress ${FIRMWARE} 2>&1 | tee cowtransfer.log
        echo "::warning file=cowtransfer.com::$(cat cowtransfer.log | grep https)"
        echo "url=$(cat cowtransfer.log | grep https | cut -f3 -d" ")" >> $GITHUB_OUTPUT

    - name: Upload firmware to WeTransfer
      id: wetransfer
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_WETRANSFER == 'true' && !cancelled()
      run: |
        curl -fsSL git.io/file-transfer | sh
        ./transfer wet -s -p 16 --no-progress ${FIRMWARE} 2>&1 | tee wetransfer.log
        echo "::warning file=wetransfer.com::$(cat wetransfer.log | grep https)"
        echo "url=$(cat wetransfer.log | grep https | cut -f3 -d" ")" >> $GITHUB_OUTPUT

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        [ $UPLOAD_COWTRANSFER = true ] && echo "🔗 [Cowtransfer](${{ steps.cowtransfer.outputs.url }})" >> release.txt
        [ $UPLOAD_WETRANSFER = true ] && echo "🔗 [WeTransfer](${{ steps.wetransfer.outputs.url }})" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Remove old Releases
      uses: ophub/delete-releases-workflows@main
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        delete_releases: true
        releases_keep_latest: 3
        delete_tags: true
        gh_token: ${{ secrets.GITHUB_TOKEN }}
