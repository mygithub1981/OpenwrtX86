name: Build PassWall Packages Only

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: passwall-only.config
  DIY_P1_SH: diy-part1.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
        bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext \
        gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool \
        lib32gcc-s1 libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
        libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev \
        libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev \
        libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip \
        p7zip-full patch pkgconf python3 python3-pip python3-ply \
        python3-docutils python3-pyelftools python3-setuptools \
        qemu-utils re2c rsync scons squashfs-tools subversion swig \
        texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone ImmortalWrt source
      run: |
        git clone -b $REPO_BRANCH --single-branch --filter=blob:none $REPO_URL openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Use PassWall official method 2
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        rm -rf feeds/packages/net/{xray-core,v2ray-geodata,sing-box,chinadns-ng,dns2socks,hysteria,ipt2socks,microsocks,naiveproxy,shadowsocks-rust,shadowsocksr-libev,simple-obfs,tcping,v2ray-plugin,xray-plugin,geoview,shadow-tls}
        git clone https://github.com/Openwrt-Passwall/openwrt-passwall-packages package/passwall-packages
        rm -rf feeds/luci/applications/luci-app-passwall
        git clone https://github.com/Openwrt-Passwall/openwrt-passwall package/passwall-luci
        rm -rf tmp/

    - name: Load configuration
      run: |
        [ -f "$CONFIG_FILE" ] || { echo "缺少配置文件: $CONFIG_FILE"; exit 1; }
        cp "$CONFIG_FILE" openwrt/.config

    - name: Make defconfig and check PassWall module
      run: |
        cd openwrt
        make defconfig
        grep -q '^CONFIG_PACKAGE_luci-app-passwall=m$' .config || { echo 'luci-app-passwall 没有以 M 模块方式选中'; exit 1; }
        grep -q '^CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=m$' .config || { echo 'luci-i18n-passwall-zh-cn 没有以 M 模块方式选中'; exit 1; }
        grep -q '^CONFIG_PACKAGE_luci-app-passwall_Nftables_Transparent_Proxy=y$' .config || { echo 'PassWall nftables/fw4 透明代理选项未选中'; exit 1; }
        grep -E 'CONFIG_PACKAGE_luci-app-passwall|CONFIG_PACKAGE_luci-i18n-passwall|CONFIG_PACKAGE_.*passwall' .config || true

    - name: Download source packages
      run: |
        cd openwrt
        make download -j$(($(nproc) * 3 / 2))
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Prepare OpenWrt tools, toolchain and target kernel
      run: |
        cd openwrt
        make tools/install -j$(($(nproc) * 3 / 2)) || make tools/install -j1 V=s
        make toolchain/install -j$(($(nproc) * 3 / 2)) || make toolchain/install -j1 V=s
        echo "准备 target/linux，供 fw4/nftables 相关 kmod 依赖使用"
        make target/linux/compile -j$(($(nproc) * 3 / 2)) || make target/linux/compile -j1 V=s
        echo "预编译 package/kernel/linux，避免后续 PassWall 编译阶段突然失败"
        make package/kernel/linux/compile -j$(($(nproc) * 3 / 2)) || make package/kernel/linux/compile -j1 V=s

    - name: Compile PassWall module packages
      run: |
        cd openwrt
        set +e
        FAILED=0
        compile_target() {
          local dir="$1"
          [ -d "$dir" ] || return 0
          echo "编译目标：$dir/compile"
          make "$dir/compile" -j$(($(nproc) * 3 / 2))
          local ret=$?
          if [ "$ret" -ne 0 ]; then
            make "$dir/compile" -j1 V=s
            ret=$?
          fi
          return "$ret"
        }
        find package/passwall-packages package/passwall-luci -name Makefile -printf '%h\n' | sort -u > /tmp/passwall-dirs.txt
        while IFS= read -r dir; do
          compile_target "$dir" || FAILED=1
        done < /tmp/passwall-dirs.txt
        if [ "$FAILED" -ne 0 ]; then
          if [ -d logs ]; then
            find logs -type f | sort | while read -r f; do
              if grep -qiE 'error|failed|No such file|not found|undefined reference|No rule to make target' "$f"; then
                echo "-------------------- $f --------------------"
                tail -n 220 "$f"
              fi
            done
          fi
          exit 1
        fi

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: passwall-build-logs
        path: openwrt/logs/
        if-no-files-found: ignore

    - name: Collect generated packages
      run: |
        mkdir -p passwall-apk
        find openwrt/bin/packages -type f \( -name '*.apk' -o -name '*.ipk' \) -exec cp -v {} passwall-apk/ \;
        ls -lh passwall-apk/
        [ -n "$(ls -A passwall-apk)" ] || { echo '没有找到生成的软件包'; exit 1; }

    - name: Upload PassWall packages
      uses: actions/upload-artifact@v4
      with:
        name: passwall-packages
        path: passwall-apk/
