name: Build PassWall Packages Only

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: passwall-only.config
  DIY_P1_SH: diy-part1.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
        bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext \
        gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool \
        lib32gcc-s1 libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
        libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev \
        libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev \
        libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip \
        p7zip-full patch pkgconf python3 python3-pip python3-ply \
        python3-docutils python3-pyelftools python3-setuptools \
        qemu-utils re2c rsync scons squashfs-tools subversion swig \
        texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone ImmortalWrt source
      run: |
        git clone -b $REPO_BRANCH --single-branch --filter=blob:none $REPO_URL openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Replace PassWall packages with official method 2
      run: |
        cd openwrt

        ./scripts/feeds update -a
        ./scripts/feeds install -a

        # 移除 openwrt feeds 自带的核心库
        rm -rf feeds/packages/net/{xray-core,v2ray-geodata,sing-box,chinadns-ng,dns2socks,hysteria,ipt2socks,microsocks,naiveproxy,shadowsocks-rust,shadowsocksr-libev,simple-obfs,tcping,v2ray-plugin,xray-plugin,geoview,shadow-tls}
        git clone https://github.com/Openwrt-Passwall/openwrt-passwall-packages package/passwall-packages

        # 移除 openwrt feeds 过时的 luci 版本
        rm -rf feeds/luci/applications/luci-app-passwall
        git clone https://github.com/Openwrt-Passwall/openwrt-passwall package/passwall-luci

        rm -rf tmp/

    - name: Load PassWall only configuration
      run: |
        [ -f "$CONFIG_FILE" ] || { echo "缺少配置文件: $CONFIG_FILE"; exit 1; }
        cp "$CONFIG_FILE" openwrt/.config

    - name: Make defconfig and check configuration
      run: |
        cd openwrt
        make defconfig

        echo "============================================================"
        echo "检查 PassWall 模块包配置是否生效"
        echo "============================================================"

        FAILED=0

        check_y() {
          local cfg="$1"
          if grep -q "^${cfg}=y$" .config; then
            echo "✅ ${cfg}=y"
          else
            echo "::error::❌ 缺少或未选中：${cfg}=y"
            FAILED=1
          fi
        }

        check_m() {
          local cfg="$1"
          if grep -q "^${cfg}=m$" .config; then
            echo "✅ ${cfg}=m"
          else
            echo "::error::❌ 缺少或不是模块：${cfg}=m"
            echo "当前状态："
            grep -E "^${cfg}=|^# ${cfg} is not set" .config || true
            FAILED=1
          fi
        }

        check_y CONFIG_TARGET_x86
        check_y CONFIG_TARGET_x86_64
        check_y CONFIG_TARGET_x86_64_DEVICE_generic

        check_m CONFIG_PACKAGE_luci-app-passwall
        check_m CONFIG_PACKAGE_luci-i18n-passwall-zh-cn

        check_y CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Geoview
        check_y CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Haproxy
        check_y CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Hysteria
        check_y CONFIG_PACKAGE_luci-app-passwall_INCLUDE_NaiveProxy
        check_y CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Shadowsocks_Rust_Client
        check_y CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Simple_Obfs
        check_y CONFIG_PACKAGE_luci-app-passwall_INCLUDE_SingBox
        check_y CONFIG_PACKAGE_luci-app-passwall_INCLUDE_V2ray_Geodata
        check_y CONFIG_PACKAGE_luci-app-passwall_INCLUDE_V2ray_Plugin
        check_y CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray
        check_y CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray_Plugin
        check_y CONFIG_PACKAGE_luci-app-passwall_Nftables_Transparent_Proxy

        check_m CONFIG_PACKAGE_chinadns-ng
        check_m CONFIG_PACKAGE_dns2socks
        check_m CONFIG_PACKAGE_geoview
        check_m CONFIG_PACKAGE_haproxy
        check_m CONFIG_PACKAGE_hysteria
        check_m CONFIG_PACKAGE_ipt2socks
        check_m CONFIG_PACKAGE_microsocks
        check_m CONFIG_PACKAGE_naiveproxy
        check_m CONFIG_PACKAGE_shadowsocks-libev-ss-local
        check_m CONFIG_PACKAGE_shadowsocks-libev-ss-redir
        check_m CONFIG_PACKAGE_shadowsocks-libev-ss-server
        check_m CONFIG_PACKAGE_shadowsocks-rust-sslocal
        check_m CONFIG_PACKAGE_simple-obfs-client
        check_m CONFIG_PACKAGE_sing-box
        check_m CONFIG_PACKAGE_tcping
        check_m CONFIG_PACKAGE_v2ray-geoip
        check_m CONFIG_PACKAGE_v2ray-geosite
        check_m CONFIG_PACKAGE_v2ray-plugin
        check_m CONFIG_PACKAGE_xray-core
        check_m CONFIG_PACKAGE_xray-plugin

        echo ""
        echo "PassWall 模块包配置摘要："
        grep -E "CONFIG_PACKAGE_luci-app-passwall|CONFIG_PACKAGE_chinadns-ng|CONFIG_PACKAGE_dns2socks|CONFIG_PACKAGE_geoview|CONFIG_PACKAGE_haproxy|CONFIG_PACKAGE_hysteria|CONFIG_PACKAGE_ipt2socks|CONFIG_PACKAGE_microsocks|CONFIG_PACKAGE_naiveproxy|CONFIG_PACKAGE_shadowsocks|CONFIG_PACKAGE_simple-obfs|CONFIG_PACKAGE_sing-box|CONFIG_PACKAGE_tcping|CONFIG_PACKAGE_v2ray|CONFIG_PACKAGE_xray" .config || true

        if [ "$FAILED" -ne 0 ]; then
          echo "❌ PassWall 模块包配置检查失败，请检查 passwall-only.config 或上游包名/依赖变化。"
          exit 1
        fi

        echo "✅ PassWall 模块包配置检查通过。"

    - name: Download source packages
      run: |
        cd openwrt
        make download -j$(($(nproc) * 3 / 2))
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Prepare OpenWrt build tools and toolchain
      run: |
        cd openwrt
        echo "准备 OpenWrt host tools，生成 staging_dir/host/bin/sed 等工具"
        make tools/install -j$(($(nproc) * 3 / 2)) || make tools/install -j1 V=s

        echo "准备 OpenWrt toolchain，用于编译目标架构软件包"
        make toolchain/install -j$(($(nproc) * 3 / 2)) || make toolchain/install -j1 V=s

    - name: Compile PassWall module packages
      run: |
        cd openwrt
        echo "开始定向编译 PassWall 模块软件包，避免触发 package/kernel/linux 全局编译"

        compile_target() {
          local dir="$1"
          [ -n "$dir" ] || return 0
          if [ ! -d "$dir" ]; then
            echo "跳过不存在的目录：$dir"
            return 0
          fi

          echo "============================================================"
          echo "编译目标：$dir/compile"
          echo "============================================================"

          make "$dir/compile" -j$(($(nproc) * 3 / 2))
          local ret=$?
          if [ "$ret" -ne 0 ]; then
            echo "并行编译 $dir 失败，使用 -j1 V=s 重试"
            make "$dir/compile" -j1 V=s
            ret=$?
          fi
          return "$ret"
        }

        set +e
        FAILED=0

        # feeds 中没有被方法2替换、但你选择为 M 的 PassWall 相关包
        for dir in \
          package/feeds/packages/shadowsocks-libev \
          package/feeds/packages/haproxy; do
          compile_target "$dir" || FAILED=1
        done

        # 方法2拉取的 PassWall 官方核心库目录
        if [ -d package/passwall-packages ]; then
          find package/passwall-packages -name Makefile -printf '%h\n' | sort -u > /tmp/passwall-package-dirs.txt
          while IFS= read -r dir; do
            compile_target "$dir" || FAILED=1
          done < /tmp/passwall-package-dirs.txt
        fi

        # 方法2拉取的 PassWall LuCI 目录
        if [ -d package/passwall-luci ]; then
          find package/passwall-luci -name Makefile -printf '%h\n' | sort -u > /tmp/passwall-luci-dirs.txt
          while IFS= read -r dir; do
            compile_target "$dir" || FAILED=1
          done < /tmp/passwall-luci-dirs.txt
        fi

        if [ "$FAILED" -ne 0 ]; then
          echo "============================================================"
          echo "PassWall 定向模块包编译失败，输出 OpenWrt 日志目录中的关键错误"
          echo "============================================================"

          if [ -d logs ]; then
            echo "最近生成的日志文件："
            find logs -type f -printf '%T@ %p\n' | sort -n | tail -n 30 | cut -d' ' -f2- || true

            echo ""
            echo "包含 error / failed / No such file / not found 的日志尾部："
            find logs -type f | sort | while read -r f; do
              if grep -qiE 'error|failed|No such file|not found|undefined reference|No rule to make target' "$f"; then
                echo ""
                echo "-------------------- $f --------------------"
                tail -n 220 "$f"
              fi
            done
          else
            echo "没有找到 openwrt/logs 目录。"
          fi

          exit 1
        fi

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: passwall-build-logs
        path: openwrt/logs/
        if-no-files-found: ignore

    - name: Collect PassWall packages
      run: |
        mkdir -p passwall-apk

        find openwrt/bin/packages -type f \( -name "*.apk" -o -name "*.ipk" \) \
          | grep -Ei '(passwall|xray|sing-box|hysteria|v2ray|geodata|geoip|geosite|chinadns|dns2socks|ipt2socks|microsocks|naiveproxy|shadowsocks|simple-obfs|tcping|haproxy|geoview)' \
          | xargs -r -I{} cp -v {} passwall-apk/

        echo "已收集的软件包："
        ls -lh passwall-apk/

        if [ -z "$(ls -A passwall-apk)" ]; then
          echo "没有找到 PassWall 相关软件包"
          exit 1
        fi

    - name: Upload PassWall packages
      uses: actions/upload-artifact@v4
      with:
        name: passwall-packages
        path: passwall-apk/
